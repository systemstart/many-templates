apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .pg.appName }}-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: {{ .pg.appName }}
spec:
  serviceName: {{ .pg.appName }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: {{ .pg.appName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: {{ .pg.appName }}
    spec:
      containers:
        - name: postgres
          image: {{ .pg.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .pg.dbUser }}
            - name: POSTGRES_DB
              value: {{ .pg.dbName }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .pg.secretName }}
                  key: {{ .pg.secretKey }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .storageClass }}
        resources:
          requests:
            storage: {{ .storage.postgres }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .pg.appName }}-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: {{ .pg.appName }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: {{ .pg.appName }}
  ports:
    - port: 5432
      targetPort: 5432
